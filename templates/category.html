<!DOCTYPE html>
<html>
<head>
    <title>{{ category }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-main">
            <a href="/">Home</a>
            <a href="/search">Search</a>
            <a href="/about">About</a>
        </div>
        <div class="nav-categories">
            <span class="nav-label">Categories:</span>
            <a href="/category/plastic" {% if category.lower() == 'plastic' %}class="active"{% endif %}>Plastic</a>
            <a href="/category/organic" {% if category.lower() == 'organic' %}class="active"{% endif %}>Organic</a>
            <a href="/category/glass" {% if category.lower() == 'glass' %}class="active"{% endif %}>Glass</a>
            <a href="/category/metal" {% if category.lower() == 'metal' %}class="active"{% endif %}>Metal</a>
            <a href="/category/paper" {% if category.lower() == 'paper' %}class="active"{% endif %}>Paper</a>
        </div>
    </nav>
    <div class="container">
        <h1>{{ category }}</h1>
        
        <p>Items in this category:</p>
        <ul class="item-list">
        {% for item in items %}
            <li>{{ item }}</li>
        {% endfor %}
        </ul>
    </div>
    <footer>
        <p>Waste Segregation Guide - COMP5046 - UN SDG Goal 12</p>
    </footer>
</body>
</html>
