<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-main">
            <a href="/">Home</a>
            <a href="/search">Search</a>
            <a href="/about">About</a>
            <a href="/recycling-rules">Recycling Rules</a>
            <a href="/feedback" class="active">Feedback</a>
        </div>
        <div class="nav-categories">
            <span class="nav-label">Categories:</span>
            <a href="/category/plastic">Plastic</a>
            <a href="/category/organic">Organic</a>
            <a href="/category/glass">Glass</a>
            <a href="/category/metal">Metal</a>
            <a href="/category/paper">Paper</a>
        </div>
    </nav>
    <div class="container">
        <h1>Share Your Feedback</h1>
        <p>Help us improve the Waste Segregation Guide. Let us know what works and what could be better.</p>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/feedback" class="feedback-form">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email (optional)</label>
            <input type="email" id="email" name="email">
            
            <label for="message">Your feedback *</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            
            <button type="submit">Submit Feedback</button>
        </form>
    </div>
    <footer>
        <p>Waste Segregation Guide - COMP5046 - UN SDG Goal 12</p>
    </footer>
</body>
</html>
